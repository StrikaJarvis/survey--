<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shield Awards · Голосование</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --card-bg: rgba(16, 16, 20, 0.88);
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #777777;
      --border-light: rgba(255, 255, 255, 0.06);
      --radius: 28px;
      --radius-sm: 40px;
      --transition: 0.25s ease;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      line-height: 1.5;
      position: relative;
      overflow-x: hidden;
    }

    /* ---------- Эндер-столбы (фон) ---------- */
    .ender-pillars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .pillar {
      position: absolute;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to top, rgba(255, 255, 255, 0.0) 0%, rgba(200, 200, 255, 0.2) 50%, rgba(255, 255, 255, 0.6) 85%, rgba(255, 255, 255, 0.9) 100%);
      border-radius: 2px;
      animation: glowPulse 4s infinite alternate ease-in-out;
      transform-origin: bottom;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.08), 0 0 40px rgba(200, 200, 255, 0.03);
    }

    .pillar:nth-child(odd) { animation-duration: 5s; }
    .pillar:nth-child(3n) { animation-duration: 6s; animation-delay: 0.6s; }
    .pillar:nth-child(5n+2) { animation-duration: 3.8s; animation-delay: 1.2s; }
    .pillar:nth-child(7n+4) { animation-duration: 7s; animation-delay: 0.3s; }

    @keyframes glowPulse {
      0% { opacity: 0.25; filter: brightness(0.5); }
      100% { opacity: 0.9; filter: brightness(1.3); }
    }

    /* ---------- Карточка опроса ---------- */
    .poll-wrapper {
      position: relative;
      z-index: 1;
      max-width: 820px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius);
      padding: 40px 36px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid var(--border-light);
    }

    /* ---------- Шапка ---------- */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 20px;
    }

    .header .shield {
      font-size: 2.6rem;
      line-height: 1;
      opacity: 0.8;
    }

    .header h1 {
      font-size: 2.0rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .header .year {
      font-size: 0.9rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 16px;
      border-radius: 40px;
      color: var(--text-secondary);
      margin-left: auto;
      letter-spacing: 0.3px;
      border: 1px solid var(--border-light);
    }

    /* ---------- Навигация ---------- */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 6px 6px 20px;
      border-radius: var(--radius-sm);
      margin: 4px 0 24px;
      border: 1px solid var(--border-light);
    }

    .nav-bar .nav-btn {
      background: transparent;
      border: none;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      line-height: 1;
    }

    .nav-bar .nav-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .nav-bar .nav-btn:disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    .nav-bar .nomination-counter {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }

    /* ---------- Блок вопроса ---------- */
    .question-block {
      margin-bottom: 28px;
    }

    .question-block .nomination-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .question-block .nomination-sub {
      font-size: 1rem;
      color: var(--text-secondary);
      border-left: 3px solid rgba(255, 255, 255, 0.15);
      padding-left: 16px;
      font-weight: 400;
    }

    /* ---------- Список кандидатов ---------- */
    .candidates {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 18px 0 24px;
    }

    .candidate-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.04);
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      border: 1.5px solid transparent;
      transition: var(--transition);
      cursor: pointer;
    }

    .candidate-item:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .candidate-item.selected {
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .candidate-item input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      flex-shrink: 0;
      background: transparent;
      transition: 0.15s;
      cursor: pointer;
    }

    .candidate-item input[type="radio"]:checked {
      border-color: #fff;
      background: #fff;
      box-shadow: inset 0 0 0 6px #0a0a0a, 0 0 0 1px #fff;
    }

    .candidate-item label {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      letter-spacing: -0.2px;
    }

    /* ---------- Кнопка ---------- */
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      margin-top: 4px;
    }

    .btn {
      border: none;
      padding: 14px 36px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-primary {
      background: #ffffff;
      color: #0a0a0a;
      border-color: #ffffff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #e0e0e0;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 255, 255, 0.1);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0px);
    }

    .btn-primary:disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* ---------- Статус ---------- */
    .status-message {
      margin-top: 22px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid var(--border-light);
    }

    .status-message .hint {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-light);
      padding-top: 18px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .poll-wrapper { padding: 24px 16px; }
      .header h1 { font-size: 1.5rem; }
      .header .shield { font-size: 2rem; }
      .nav-bar { flex-wrap: wrap; justify-content: center; gap: 6px; }
      .candidate-item { padding: 12px 16px; }
      .candidate-item label { font-size: 0.95rem; }
      .btn { padding: 12px 24px; font-size: 0.9rem; width: 100%; justify-content: center; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .status-message { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- Фоновые эндер-столбы (генерируются JS) -->
<div class="ender-pillars" id="pillarsContainer"></div>

<div class="poll-wrapper">
  <div class="header">
    <span class="shield">⚔</span>
    <h1>Shield Awards</h1>
    <span class="year">2026</span>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevNomBtn">‹</button>
    <span class="nomination-counter" id="nomCounter">1 / 14</span>
    <button class="nav-btn" id="nextNomBtn">›</button>
  </div>

  <div class="question-block">
    <div class="nomination-title" id="nomTitle">🏆 Номинация</div>
    <div class="nomination-sub" id="nomSub">Выберите одного кандидата</div>
  </div>

  <div class="candidates" id="candidatesContainer"></div>

  <div class="action-bar">
    <button class="btn btn-primary" id="voteBtn">Голосовать</button>
  </div>

  <div class="status-message">
    <span id="statusText">💡 Выберите кандидата и нажмите «Голосовать»</span>
    <span class="hint" id="selectedHint">—</span>
  </div>

  <div class="footer">анонимное голосование · локальное хранилище</div>
</div>

<script>
  // ============================================================
  //  1. Генерация эндер-столбов (16 штук)
  // ============================================================
  (function createPillars() {
    const container = document.getElementById('pillarsContainer');
    const count = 16;
    for (let i = 0; i < count; i++) {
      const pillar = document.createElement('div');
      pillar.className = 'pillar';
      const left = Math.random() * 100;
      const height = 25 + Math.random() * 75;
      const width = 1.5 + Math.random() * 3;
      const delay = (Math.random() * 6).toFixed(2);
      const duration = 3 + Math.random() * 5;
      pillar.style.left = left + '%';
      pillar.style.height = height + '%';
      pillar.style.width = width + 'px';
      pillar.style.animationDelay = delay + 's';
      pillar.style.animationDuration = duration + 's';
      container.appendChild(pillar);
    }
  })();

  // ============================================================
  //  2. НОМИНАЦИИ (14 штук, без стримера)
  // ============================================================
  const NOMINATIONS = [
    {
      id: 'best_player',
      title: '🏅 Лучший игрок сезона',
      subtitle: 'Кто показал наилучшую игру?',
      candidates: ['Алексей_99', 'Vortex', 'ShadowMaster', 'CrafterPro']
    },
    {
      id: 'best_builder',
      title: '🏗️ Лучший строитель',
      subtitle: 'Чьи постройки впечатлили всех?',
      candidates: ['PixelArtisan', 'BlockWizard', 'MegaBuild', 'ArchitectFox']
    },
    {
      id: 'best_pvp',
      title: '⚔️ Лучший PvP-игрок',
      subtitle: 'Кто сильнейший на арене?',
      candidates: ['KillerBee', 'PvPKing', 'ArenaMaster', 'StrikerX']
    },
    {
      id: 'best_event',
      title: '🎉 Лучший ивент сезона',
      subtitle: 'Какое событие вам запомнилось?',
      candidates: ['Охота на дракона', 'Турнир лучников', 'Постройка города', 'Новогодний карнавал']
    },
    {
      id: 'best_art',
      title: '🎨 Человек искусства',
      subtitle: 'Кто создал самый красивый арт?',
      candidates: ['ArtMage', 'PixelPainter', 'SketchMaster', 'ColorWeaver']
    },
    {
      id: 'best_admin',
      title: '🛡️ Лучший администратор',
      subtitle: 'Кто внёс наибольший вклад в порядок?',
      candidates: ['Admin_Prime', 'GuardianX', 'CraftManager', 'RuleKeeper']
    },
    {
      id: 'best_pve',
      title: '🧟 Лучший PvE-игрок',
      subtitle: 'Кто покорял данжи и боссов?',
      candidates: ['DungeonCrawler', 'BossSlayer', 'MobMaster', 'RaidLeader']
    },
    {
      id: 'best_noob',
      title: '🌱 Лучший новичок',
      subtitle: 'Кто быстро вырос и впечатлил?',
      candidates: ['NewbiePro', 'FreshStart', 'RookieStar', 'BeginnerKing']
    },
    {
      id: 'best_project',
      title: '📐 Лучший проект',
      subtitle: 'Какое коллективное творение достойно награды?',
      candidates: ['Подземный город', 'Летающий остров', 'Аквапарк', 'Храм солнца']
    },
    {
      id: 'best_farming',
      title: '🌾 Лучший фармер',
      subtitle: 'Кто собрал больше всего ресурсов?',
      candidates: ['FarmLord', 'HarvestKing', 'CropMaster', 'MinerPro']
    },
    {
      id: 'best_redstone',
      title: '🔌 Лучший редстоун-инженер',
      subtitle: 'Чьи механизмы поражают воображение?',
      candidates: ['RedstoneWiz', 'LogicMaster', 'CircuitPro', 'MechBuilder']
    },
    {
      id: 'best_team',
      title: '🤝 Лучшая PvE-команда',
      subtitle: 'Какая команда показала лучшую слаженность?',
      candidates: ['DragonSlayers', 'ShadowCrew', 'PhoenixRaid', 'IronClan']
    },
    {
      id: 'best_guildmaster',
      title: '🏰 Лучший глава гильдии',
      subtitle: 'Кто вдохновляет и объединяет игроков?',
      candidates: ['GuildMaster_1', 'LeaderPro', 'ClanChief', 'OrderKeeper']
    },
    {
      id: 'best_active',
      title: '🔥 Самый активный игрок',
      subtitle: 'Кто был на сервере чаще всех?',
      candidates: ['AlwaysOnline', 'NoLifeKing', 'GrindMachine', 'ActivityStar']
    }
  ];

  // ============================================================
  //  3. Логика голосования (без отображения результатов)
  // ============================================================
  let currentNomIndex = 0;
  let selectedCandidateId = null;
  let votes = {};
  const STORAGE_KEY = 'shield_awards_votes_anon';

  const nomTitle = document.getElementById('nomTitle');
  const nomSub = document.getElementById('nomSub');
  const candidatesContainer = document.getElementById('candidatesContainer');
  const voteBtn = document.getElementById('voteBtn');
  const prevNomBtn = document.getElementById('prevNomBtn');
  const nextNomBtn = document.getElementById('nextNomBtn');
  const nomCounter = document.getElementById('nomCounter');
  const statusText = document.getElementById('statusText');
  const selectedHint = document.getElementById('selectedHint');

  // Загрузка / сохранение
  function loadVotes() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        let valid = true;
        for (const nom of NOMINATIONS) {
          if (!Array.isArray(parsed[nom.id]) || parsed[nom.id].length !== nom.candidates.length) {
            valid = false;
            break;
          }
        }
        if (valid) { votes = parsed; return; }
      } catch (e) {}
    }
    votes = {};
    for (const nom of NOMINATIONS) {
      votes[nom.id] = new Array(nom.candidates.length).fill(0);
    }
    saveVotes();
  }
  function saveVotes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
  }

  function getCurrentNom() { return NOMINATIONS[currentNomIndex]; }
  function getCurrentVotes() {
    const nom = getCurrentNom();
    return votes[nom.id] || new Array(nom.candidates.length).fill(0);
  }

  // Отрисовка (без баров и процентов)
  function render() {
    const nom = getCurrentNom();
    nomTitle.textContent = nom.title;
    nomSub.textContent = nom.subtitle;
    nomCounter.textContent = `${currentNomIndex + 1} / ${NOMINATIONS.length}`;
    prevNomBtn.disabled = (currentNomIndex === 0);
    nextNomBtn.disabled = (currentNomIndex === NOMINATIONS.length - 1);

    // Кандидаты
    candidatesContainer.innerHTML = '';
    nom.candidates.forEach((candidate, idx) => {
      const isSelected = (selectedCandidateId === idx);
      const item = document.createElement('div');
      item.className = `candidate-item${isSelected ? ' selected' : ''}`;

      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = 'candidate';
      radio.value = idx;
      radio.checked = isSelected;
      radio.id = `cand_${idx}`;

      const label = document.createElement('label');
      label.htmlFor = `cand_${idx}`;
      label.textContent = candidate;

      item.appendChild(radio);
      item.appendChild(label);

      item.addEventListener('click', (e) => {
        if (e.target.tagName !== 'INPUT') {
          radio.checked = true;
          const ev = new Event('change', { bubbles: true });
          radio.dispatchEvent(ev);
        }
      });

      radio.addEventListener('change', (e) => {
        if (e.target.checked) {
          document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          selectedCandidateId = idx;
          selectedHint.textContent = `✅ «${candidate}»`;
          voteBtn.disabled = false;
          statusText.textContent = '📌 Выбран кандидат. Нажмите «Голосовать»';
        }
      });

      candidatesContainer.appendChild(item);
    });

    // Статус
    if (selectedCandidateId === null) {
      voteBtn.disabled = true;
      selectedHint.textContent = '—';
      statusText.textContent = '💡 Выберите кандидата и нажмите «Голосовать»';
    } else {
      voteBtn.disabled = false;
      statusText.textContent = '📌 Выбран кандидат. Нажмите «Голосовать»';
    }
  }

  // Голосование
  function handleVote() {
    if (selectedCandidateId === null) return;
    const nom = getCurrentNom();
    const currentVotes = votes[nom.id];
    if (!currentVotes) return;
    currentVotes[selectedCandidateId] += 1;

    // Сброс выбора
    selectedCandidateId = null;
    document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
    document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
    voteBtn.disabled = true;
    selectedHint.textContent = '—';
    statusText.textContent = '✅ Голос учтён! Выберите другого кандидата или переключите номинацию.';

    saveVotes();
    render(); // перерисовываем, чтобы обновить статус и список
  }

  // Навигация
  function goToNom(index) {
    if (index < 0 || index >= NOMINATIONS.length) return;
    currentNomIndex = index;
    selectedCandidateId = null;
    document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
    document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
    voteBtn.disabled = true;
    selectedHint.textContent = '—';
    statusText.textContent = '💡 Выберите кандидата и нажмите «Голосовать»';
    render();
  }

  function init() {
    loadVotes();
    currentNomIndex = 0;
    selectedCandidateId = null;
    render();

    voteBtn.addEventListener('click', handleVote);
    prevNomBtn.addEventListener('click', () => goToNom(currentNomIndex - 1));
    nextNomBtn.addEventListener('click', () => goToNom(currentNomIndex + 1));
  }

  init();
</script>
</body>
</html>

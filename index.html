<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shield Awards · Голосование</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    /* --------------------------------------------
       Базовый сброс, переменные, фон
    -------------------------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --card-bg: rgba(20, 20, 24, 0.85);
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #777777;
      --border-light: rgba(255, 255, 255, 0.08);
      --border-focus: #ffffff;
      --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.8);
      --radius: 28px;
      --radius-sm: 40px;
      --transition: 0.25s ease;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      line-height: 1.5;
      position: relative;
      overflow-x: hidden;
    }

    /* ---------- Эндер-столбы (фон) ---------- */
    .ender-pillars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .pillar {
      position: absolute;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to top, rgba(255, 255, 255, 0.0) 0%, rgba(220, 220, 255, 0.25) 60%, rgba(255, 255, 255, 0.6) 90%, rgba(255, 255, 255, 0.9) 100%);
      border-radius: 2px;
      animation: glowPulse 3s infinite alternate ease-in-out;
      transform-origin: bottom;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.1), 0 0 30px rgba(200, 200, 255, 0.05);
    }

    /* Каждый столб будет иметь свой размер, позицию и задержку */
    .pillar:nth-child(odd) { animation-duration: 4s; }
    .pillar:nth-child(3n) { animation-duration: 5s; animation-delay: 0.5s; }
    .pillar:nth-child(5n+2) { animation-duration: 3.5s; animation-delay: 1s; }
    .pillar:nth-child(7n+4) { animation-duration: 6s; animation-delay: 0.2s; }

    @keyframes glowPulse {
      0% { opacity: 0.3; filter: brightness(0.6); }
      100% { opacity: 1; filter: brightness(1.2); }
    }

    /* ---------- Карточка опроса ---------- */
    .poll-wrapper {
      position: relative;
      z-index: 1;
      max-width: 820px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius);
      padding: 40px 36px 32px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border-light);
    }

    /* ---------- Шапка ---------- */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 20px;
    }

    .header .shield {
      font-size: 2.6rem;
      line-height: 1;
      opacity: 0.8;
    }

    .header h1 {
      font-size: 2.0rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .header .year {
      font-size: 0.9rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.06);
      padding: 4px 16px;
      border-radius: 40px;
      color: var(--text-secondary);
      margin-left: auto;
      letter-spacing: 0.3px;
      border: 1px solid var(--border-light);
    }

    /* ---------- Навигация ---------- */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      padding: 6px 6px 6px 20px;
      border-radius: var(--radius-sm);
      margin: 4px 0 24px;
      border: 1px solid var(--border-light);
    }

    .nav-bar .nav-btn {
      background: transparent;
      border: none;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      line-height: 1;
    }

    .nav-bar .nav-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .nav-bar .nav-btn:disabled {
      opacity: 0.25;
      pointer-events: none;
    }

    .nav-bar .nomination-counter {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }

    /* ---------- Блок вопроса ---------- */
    .question-block {
      margin-bottom: 28px;
    }

    .question-block .nomination-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .question-block .nomination-sub {
      font-size: 1rem;
      color: var(--text-secondary);
      border-left: 3px solid rgba(255, 255, 255, 0.2);
      padding-left: 16px;
      font-weight: 400;
    }

    /* ---------- Список кандидатов ---------- */
    .candidates {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 18px 0 24px;
    }

    .candidate-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.04);
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      border: 1.5px solid transparent;
      transition: var(--transition);
      cursor: pointer;
    }

    .candidate-item:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .candidate-item.selected {
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.02);
    }

    .candidate-item input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      flex-shrink: 0;
      background: transparent;
      transition: 0.15s;
      position: relative;
      cursor: pointer;
    }

    .candidate-item input[type="radio"]:checked {
      border-color: #fff;
      background: #fff;
      box-shadow: inset 0 0 0 6px #0a0a0a, 0 0 0 1px #fff;
    }

    .candidate-item label {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      letter-spacing: -0.2px;
    }

    /* ---------- Результаты ---------- */
    .results-block {
      margin: 20px 0 18px;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-row .name {
      flex: 0 0 140px;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .result-row .bar-wrapper {
      flex: 1;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      overflow: hidden;
    }

    .result-row .bar-fill {
      height: 100%;
      background: #d0d0d0;
      border-radius: 40px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .result-row .percent {
      min-width: 48px;
      text-align: right;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    /* ---------- Кнопки ---------- */
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 4px;
    }

    .btn {
      border: none;
      padding: 14px 36px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-primary {
      background: #ffffff;
      color: #0a0a0a;
      border-color: #ffffff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #e0e0e0;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 255, 255, 0.1);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0px);
    }

    .btn-primary:disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .btn-secondary {
      background: transparent;
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .vote-count {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.04);
      padding: 6px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
    }

    /* ---------- Статус ---------- */
    .status-message {
      margin-top: 22px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid var(--border-light);
    }

    .status-message .hint {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ---------- Футер ---------- */
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-light);
      padding-top: 18px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ---------- Адаптив ---------- */
    @media (max-width: 600px) {
      .poll-wrapper { padding: 24px 16px; }
      .header h1 { font-size: 1.5rem; }
      .header .shield { font-size: 2rem; }
      .nav-bar { flex-wrap: wrap; justify-content: center; gap: 6px; }
      .candidate-item { padding: 12px 16px; }
      .candidate-item label { font-size: 0.95rem; }
      .result-row .name { flex-basis: 100px; font-size: 0.85rem; }
      .btn { padding: 12px 24px; font-size: 0.9rem; width: 100%; justify-content: center; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .vote-count { text-align: center; }
      .status-message { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- Фоновые эндер-столбы (генерируются через JS) -->
<div class="ender-pillars" id="pillarsContainer"></div>

<!-- Основная карточка -->
<div class="poll-wrapper">
  <div class="header">
    <span class="shield">⚔</span>
    <h1>Shield Awards</h1>
    <span class="year">2026</span>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevNomBtn">‹</button>
    <span class="nomination-counter" id="nomCounter">1 / 10</span>
    <button class="nav-btn" id="nextNomBtn">›</button>
  </div>

  <div class="question-block">
    <div class="nomination-title" id="nomTitle">🏆 Номинация</div>
    <div class="nomination-sub" id="nomSub">Выберите одного кандидата</div>
  </div>

  <div class="candidates" id="candidatesContainer"></div>

  <div class="results-block" id="resultsBlock" style="display: none;"></div>

  <div class="action-bar">
    <button class="btn btn-primary" id="voteBtn">Голосовать</button>
    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <button class="btn btn-secondary" id="resetBtn">Сбросить</button>
      <span class="vote-count" id="totalVotes">0 голосов</span>
    </div>
  </div>

  <div class="status-message">
    <span id="statusText">💡 Выберите кандидата и нажмите «Голосовать»</span>
    <span class="hint" id="selectedHint">—</span>
  </div>

  <div class="footer">анонимное голосование · локальное хранилище</div>
</div>

<script>
  // ============================================================
  //  1. Генерация эндер-столбов
  // ============================================================
  (function createPillars() {
    const container = document.getElementById('pillarsContainer');
    const count = 14; // количество столбов
    for (let i = 0; i < count; i++) {
      const pillar = document.createElement('div');
      pillar.className = 'pillar';
      const left = Math.random() * 100; // %
      const height = 30 + Math.random() * 70; // % от высоты экрана
      const width = 1.5 + Math.random() * 3; // px
      const delay = (Math.random() * 5).toFixed(2);
      const duration = 3 + Math.random() * 4;
      pillar.style.left = left + '%';
      pillar.style.height = height + '%';
      pillar.style.width = width + 'px';
      pillar.style.animationDelay = delay + 's';
      pillar.style.animationDuration = duration + 's';
      // случайный разброс по яркости
      const opacity = 0.3 + Math.random() * 0.7;
      pillar.style.setProperty('--pillar-opacity', opacity);
      container.appendChild(pillar);
    }
  })();

  // ============================================================
  //  2. НОМИНАЦИИ (теперь 10 штук)
  // ============================================================
  const NOMINATIONS = [
    {
      id: 'best_player',
      title: '🏅 Лучший игрок сезона',
      subtitle: 'Кто показал наилучшую игру?',
      candidates: ['Алексей_99', 'Vortex', 'ShadowMaster', 'CrafterPro']
    },
    {
      id: 'best_builder',
      title: '🏗️ Лучший строитель',
      subtitle: 'Чьи постройки впечатлили всех?',
      candidates: ['PixelArtisan', 'BlockWizard', 'MegaBuild', 'ArchitectFox']
    },
    {
      id: 'best_pvp',
      title: '⚔️ Лучший PvP-игрок',
      subtitle: 'Кто сильнейший на арене?',
      candidates: ['KillerBee', 'PvPKing', 'ArenaMaster', 'StrikerX']
    },
    {
      id: 'best_event',
      title: '🎉 Лучший ивент сезона',
      subtitle: 'Какое событие вам запомнилось?',
      candidates: ['Охота на дракона', 'Турнир лучников', 'Постройка города', 'Новогодний карнавал']
    },
    {
      id: 'best_art',
      title: '🎨 Человек искусства',
      subtitle: 'Кто создал самый красивый арт?',
      candidates: ['ArtMage', 'PixelPainter', 'SketchMaster', 'ColorWeaver']
    },
    {
      id: 'best_streamer',
      title: '📺 Лучший стример',
      subtitle: 'Кто транслировал самые яркие моменты?',
      candidates: ['StreamGod', 'VoxelLive', 'MineCaster', 'LunarTV']
    },
    {
      id: 'best_admin',
      title: '🛡️ Лучший администратор',
      subtitle: 'Кто внёс наибольший вклад в порядок?',
      candidates: ['Admin_Prime', 'GuardianX', 'CraftManager', 'RuleKeeper']
    },
    {
      id: 'best_pve',
      title: '🧟 Лучший PvE-игрок',
      subtitle: 'Кто покорял данжи и боссов?',
      candidates: ['DungeonCrawler', 'BossSlayer', 'MobMaster', 'RaidLeader']
    },
    {
      id: 'best_noob',
      title: '🌱 Лучший новичок',
      subtitle: 'Кто быстро вырос и впечатлил?',
      candidates: ['NewbiePro', 'FreshStart', 'RookieStar', 'BeginnerKing']
    },
    {
      id: 'best_project',
      title: '📐 Лучший проект',
      subtitle: 'Какое коллективное творение достойно награды?',
      candidates: ['Подземный город', 'Летающий остров', 'Аквапарк', 'Храм солнца']
    }
  ];

  // ============================================================
  //  3. Логика голосования (как раньше)
  // ============================================================
  let currentNomIndex = 0;
  let selectedCandidateId = null;
  let votes = {};
  const STORAGE_KEY = 'shield_awards_votes';

  const nomTitle = document.getElementById('nomTitle');
  const nomSub = document.getElementById('nomSub');
  const candidatesContainer = document.getElementById('candidatesContainer');
  const resultsBlock = document.getElementById('resultsBlock');
  const voteBtn = document.getElementById('voteBtn');
  const resetBtn = document.getElementById('resetBtn');
  const prevNomBtn = document.getElementById('prevNomBtn');
  const nextNomBtn = document.getElementById('nextNomBtn');
  const nomCounter = document.getElementById('nomCounter');
  const totalVotesSpan = document.getElementById('totalVotes');
  const statusText = document.getElementById('statusText');
  const selectedHint = document.getElementById('selectedHint');

  function loadVotes() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        let valid = true;
        for (const nom of NOMINATIONS) {
          if (!Array.isArray(parsed[nom.id]) || parsed[nom.id].length !== nom.candidates.length) {
            valid = false;
            break;
          }
        }
        if (valid) { votes = parsed; return; }
      } catch (e) {}
    }
    votes = {};
    for (const nom of NOMINATIONS) {
      votes[nom.id] = new Array(nom.candidates.length).fill(0);
    }
    saveVotes();
  }
  function saveVotes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
  }

  function getCurrentNom() { return NOMINATIONS[currentNomIndex]; }
  function getCurrentVotes() {
    const nom = getCurrentNom();
    return votes[nom.id] || new Array(nom.candidates.length).fill(0);
  }
  function getTotalVotesForCurrent() {
    return getCurrentVotes().reduce((s, v) => s + v, 0);
  }

  function render() {
    const nom = getCurrentNom();
    const currentVotes = getCurrentVotes();
    const total = getTotalVotesForCurrent();

    nomTitle.textContent = nom.title;
    nomSub.textContent = nom.subtitle;
    nomCounter.textContent = `${currentNomIndex + 1} / ${NOMINATIONS.length}`;
    prevNomBtn.disabled = (currentNomIndex === 0);
    nextNomBtn.disabled = (currentNomIndex === NOMINATIONS.length - 1);

    candidatesContainer.innerHTML = '';
    nom.candidates.forEach((candidate, idx) => {
      const isSelected = (selectedCandidateId === idx);
      const item = document.createElement('div');
      item.className = `candidate-item${isSelected ? ' selected' : ''}`;

      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = 'candidate';
      radio.value = idx;
      radio.checked = isSelected;
      radio.id = `cand_${idx}`;

      const label = document.createElement('label');
      label.htmlFor = `cand_${idx}`;
      label.textContent = candidate;

      item.appendChild(radio);
      item.appendChild(label);

      item.addEventListener('click', (e) => {
        if (e.target.tagName !== 'INPUT') {
          radio.checked = true;
          const ev = new Event('change', { bubbles: true });
          radio.dispatchEvent(ev);
        }
      });

      radio.addEventListener('change', (e) => {
        if (e.target.checked) {
          document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          selectedCandidateId = idx;
          selectedHint.textContent = `✅ «${candidate}»`;
          voteBtn.disabled = false;
          statusText.textContent = '📌 Выбран кандидат. Нажмите «Голосовать»';
        }
      });

      candidatesContainer.appendChild(item);
    });

    if (total > 0) {
      resultsBlock.style.display = 'block';
      resultsBlock.innerHTML = '';
      nom.candidates.forEach((candidate, idx) => {
        const percent = (currentVotes[idx] / total) * 100;
        const row = document.createElement('div');
        row.className = 'result-row';
        row.innerHTML = `
          <span class="name">${candidate}</span>
          <div class="bar-wrapper">
            <div class="bar-fill" style="width: ${percent}%"></div>
          </div>
          <span class="percent">${Math.round(percent)}%</span>
        `;
        resultsBlock.appendChild(row);
      });
    } else {
      resultsBlock.style.display = 'none';
    }

    totalVotesSpan.textContent = `${total} ${total % 10 === 1 && total % 100 !== 11 ? 'голос' : total % 10 >= 2 && total % 10 <= 4 && (total % 100 < 10 || total % 100 >= 20) ? 'голоса' : 'голосов'}`;

    if (selectedCandidateId === null) {
      voteBtn.disabled = true;
      selectedHint.textContent = '—';
      statusText.textContent = total === 0 ? '💡 Выберите кандидата и нажмите «Голосовать»' : '📊 Выберите кандидата для голосования';
    } else {
      voteBtn.disabled = false;
      if (total > 0) {
        statusText.textContent = '📌 Выберите кандидата для голосования (или сбросьте)';
      } else {
        statusText.textContent = '💡 Выберите кандидата и нажмите «Голосовать»';
      }
    }

    saveVotes();
  }

  function handleVote() {
    if (selectedCandidateId === null) return;
    const nom = getCurrentNom();
    const currentVotes = votes[nom.id];
    if (!currentVotes) return;
    currentVotes[selectedCandidateId] += 1;
    selectedCandidateId = null;
    document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
    document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
    voteBtn.disabled = true;
    selectedHint.textContent = '—';
    statusText.textContent = '✅ Голос учтён! Выберите другого кандидата или переключите номинацию.';
    render();
  }

  function handleReset() {
    const nom = getCurrentNom();
    const total = getTotalVotesForCurrent();
    if (total === 0) {
      selectedCandidateId = null;
      document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
      document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
      voteBtn.disabled = true;
      selectedHint.textContent = '—';
      statusText.textContent = '💡 Выберите кандидата';
      render();
      return;
    }
    if (confirm(`Сбросить все голоса в номинации «${nom.title}»?`)) {
      const currentVotes = votes[nom.id];
      for (let i = 0; i < currentVotes.length; i++) currentVotes[i] = 0;
      selectedCandidateId = null;
      document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
      document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
      voteBtn.disabled = true;
      selectedHint.textContent = '—';
      statusText.textContent = '🔄 Голоса обнулены. Выберите кандидата.';
      render();
    }
  }

  function goToNom(index) {
    if (index < 0 || index >= NOMINATIONS.length) return;
    currentNomIndex = index;
    selectedCandidateId = null;
    document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
    document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
    voteBtn.disabled = true;
    selectedHint.textContent = '—';
    statusText.textContent = '💡 Выберите кандидата и нажмите «Голосовать»';
    render();
  }

  function init() {
    loadVotes();
    currentNomIndex = 0;
    selectedCandidateId = null;
    render();

    voteBtn.addEventListener('click', handleVote);
    resetBtn.addEventListener('click', handleReset);
    prevNomBtn.addEventListener('click', () => goToNom(currentNomIndex - 1));
    nextNomBtn.addEventListener('click', () => goToNom(currentNomIndex + 1));
  }

  init();
</script>
</body>
</html>

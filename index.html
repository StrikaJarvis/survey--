<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shield Awards · Голосование</title>
  <!-- Современный шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    /* --------------------------------------------
       Базовый сброс и переменные
    -------------------------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #555555;
      --text-muted: #888888;
      --border-light: #e0e0e0;
      --border-focus: #333333;
      --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.06);
      --shadow-btn: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius: 24px;
      --radius-sm: 40px;
      --transition: 0.2s ease;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* ---------- Карточка опроса ---------- */
    .poll-wrapper {
      max-width: 820px;
      width: 100%;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 40px 36px 32px;
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.3s;
    }

    /* ---------- Шапка ---------- */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 20px;
    }

    .header .shield {
      font-size: 2.4rem;
      line-height: 1;
      opacity: 0.7;
    }

    .header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .header .year {
      font-size: 0.9rem;
      font-weight: 600;
      background: #eaeaea;
      padding: 4px 16px;
      border-radius: 40px;
      color: var(--text-secondary);
      margin-left: auto;
      letter-spacing: 0.3px;
    }

    /* ---------- Навигация ---------- */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      padding: 6px 6px 6px 20px;
      border-radius: var(--radius-sm);
      margin: 4px 0 24px;
    }

    .nav-bar .nav-btn {
      background: transparent;
      border: none;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      line-height: 1;
    }

    .nav-bar .nav-btn:hover:not(:disabled) {
      background: #d0d0d0;
      color: #000;
    }

    .nav-bar .nav-btn:disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .nav-bar .nomination-counter {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }

    /* ---------- Блок вопроса ---------- */
    .question-block {
      margin-bottom: 28px;
    }

    .question-block .nomination-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .question-block .nomination-sub {
      font-size: 1rem;
      color: var(--text-secondary);
      border-left: 3px solid #ccc;
      padding-left: 16px;
      font-weight: 400;
    }

    /* ---------- Список кандидатов ---------- */
    .candidates {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 18px 0 24px;
    }

    .candidate-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg);
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      border: 1.5px solid transparent;
      transition: var(--transition);
      cursor: pointer;
    }

    .candidate-item:hover {
      background: #ececec;
      border-color: #ccc;
    }

    .candidate-item.selected {
      background: #f0f0f0;
      border-color: var(--text-primary);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
    }

    .candidate-item input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid #b0b0b0;
      border-radius: 50%;
      flex-shrink: 0;
      background: #fff;
      transition: 0.15s;
      position: relative;
      cursor: pointer;
    }

    .candidate-item input[type="radio"]:checked {
      border-color: #000;
      background: #000;
      box-shadow: inset 0 0 0 6px #fff, 0 0 0 1px #000;
    }

    .candidate-item label {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      letter-spacing: -0.2px;
    }

    /* ---------- Результаты ---------- */
    .results-block {
      margin: 20px 0 18px;
      padding: 16px 18px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 0;
      border-bottom: 1px solid #e8e8e8;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-row .name {
      flex: 0 0 140px;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .result-row .bar-wrapper {
      flex: 1;
      height: 8px;
      background: #d8d8d8;
      border-radius: 40px;
      overflow: hidden;
    }

    .result-row .bar-fill {
      height: 100%;
      background: #222;
      border-radius: 40px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .result-row .percent {
      min-width: 48px;
      text-align: right;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    /* ---------- Кнопки ---------- */
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 4px;
    }

    .btn {
      border: none;
      padding: 14px 36px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f0f0f0;
      color: var(--text-primary);
      border: 1.5px solid transparent;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      box-shadow: var(--shadow-btn);
    }

    .btn-primary:hover:not(:disabled) {
      background: #000;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0px);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .btn-secondary {
      background: transparent;
      border-color: #ccc;
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: #eaeaea;
      border-color: #999;
    }

    .vote-count {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 6px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
    }

    /* ---------- Статус ---------- */
    .status-message {
      margin-top: 22px;
      padding: 14px 20px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid var(--border-light);
    }

    .status-message .hint {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ---------- Футер ---------- */
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-light);
      padding-top: 18px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ---------- Адаптив ---------- */
    @media (max-width: 600px) {
      .poll-wrapper { padding: 24px 16px; }
      .header h1 { font-size: 1.5rem; }
      .header .shield { font-size: 1.8rem; }
      .nav-bar { flex-wrap: wrap; justify-content: center; gap: 6px; }
      .candidate-item { padding: 12px 16px; }
      .candidate-item label { font-size: 0.95rem; }
      .result-row .name { flex-basis: 100px; font-size: 0.85rem; }
      .btn { padding: 12px 24px; font-size: 0.9rem; width: 100%; justify-content: center; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .vote-count { text-align: center; }
      .status-message { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="poll-wrapper">
  <!-- Шапка -->
  <div class="header">
    <span class="shield">⚔</span>
    <h1>Shield Awards</h1>
    <span class="year">2026</span>
  </div>

  <!-- Навигация -->
  <div class="nav-bar">
    <button class="nav-btn" id="prevNomBtn">‹</button>
    <span class="nomination-counter" id="nomCounter">1 / 5</span>
    <button class="nav-btn" id="nextNomBtn">›</button>
  </div>

  <!-- Вопрос -->
  <div class="question-block">
    <div class="nomination-title" id="nomTitle">🏆 Номинация</div>
    <div class="nomination-sub" id="nomSub">Выберите одного кандидата</div>
  </div>

  <!-- Кандидаты -->
  <div class="candidates" id="candidatesContainer"></div>

  <!-- Результаты -->
  <div class="results-block" id="resultsBlock" style="display: none;"></div>

  <!-- Действия -->
  <div class="action-bar">
    <button class="btn btn-primary" id="voteBtn">Голосовать</button>
    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <button class="btn btn-secondary" id="resetBtn">Сбросить</button>
      <span class="vote-count" id="totalVotes">0 голосов</span>
    </div>
  </div>

  <!-- Статус -->
  <div class="status-message">
    <span id="statusText">💡 Выберите кандидата и нажмите «Голосовать»</span>
    <span class="hint" id="selectedHint">—</span>
  </div>

  <div class="footer">анонимное голосование · локальное хранилище</div>
</div>

<script>
  (function() {
    // ============================================================
    //  НОМИНАЦИИ (отредактируйте под себя)
    // ============================================================
    const NOMINATIONS = [
      {
        id: 'best_player',
        title: '🏅 Лучший игрок сезона',
        subtitle: 'Кто показал наилучшую игру?',
        candidates: ['Алексей_99', 'Vortex', 'ShadowMaster', 'CrafterPro']
      },
      {
        id: 'best_builder',
        title: '🏗️ Лучший строитель',
        subtitle: 'Чьи постройки впечатлили всех?',
        candidates: ['PixelArtisan', 'BlockWizard', 'MegaBuild', 'ArchitectFox']
      },
      {
        id: 'best_pvp',
        title: '⚔️ Лучший PvP-игрок',
        subtitle: 'Кто сильнейший на арене?',
        candidates: ['KillerBee', 'PvPKing', 'ArenaMaster', 'StrikerX']
      },
      {
        id: 'best_event',
        title: '🎉 Лучший ивент сезона',
        subtitle: 'Какое событие вам запомнилось?',
        candidates: ['Охота на дракона', 'Турнир лучников', 'Постройка города', 'Новогодний карнавал']
      },
      {
        id: 'best_art',
        title: '🎨 Человек искусства',
        subtitle: 'Кто создал самый красивый арт?',
        candidates: ['ArtMage', 'PixelPainter', 'SketchMaster', 'ColorWeaver']
      }
    ];

    // ============================================================
    //  СОСТОЯНИЕ
    // ============================================================
    let currentNomIndex = 0;
    let selectedCandidateId = null;
    let votes = {};
    const STORAGE_KEY = 'shield_awards_votes';

    const nomTitle = document.getElementById('nomTitle');
    const nomSub = document.getElementById('nomSub');
    const candidatesContainer = document.getElementById('candidatesContainer');
    const resultsBlock = document.getElementById('resultsBlock');
    const voteBtn = document.getElementById('voteBtn');
    const resetBtn = document.getElementById('resetBtn');
    const prevNomBtn = document.getElementById('prevNomBtn');
    const nextNomBtn = document.getElementById('nextNomBtn');
    const nomCounter = document.getElementById('nomCounter');
    const totalVotesSpan = document.getElementById('totalVotes');
    const statusText = document.getElementById('statusText');
    const selectedHint = document.getElementById('selectedHint');

    // Загрузка / сохранение
    function loadVotes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          let valid = true;
          for (const nom of NOMINATIONS) {
            if (!Array.isArray(parsed[nom.id]) || parsed[nom.id].length !== nom.candidates.length) {
              valid = false;
              break;
            }
          }
          if (valid) { votes = parsed; return; }
        } catch (e) {}
      }
      votes = {};
      for (const nom of NOMINATIONS) {
        votes[nom.id] = new Array(nom.candidates.length).fill(0);
      }
      saveVotes();
    }
    function saveVotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
    }

    function getCurrentNom() { return NOMINATIONS[currentNomIndex]; }
    function getCurrentVotes() {
      const nom = getCurrentNom();
      return votes[nom.id] || new Array(nom.candidates.length).fill(0);
    }
    function getTotalVotesForCurrent() {
      return getCurrentVotes().reduce((s, v) => s + v, 0);
    }

    // Отрисовка
    function render() {
      const nom = getCurrentNom();
      const currentVotes = getCurrentVotes();
      const total = getTotalVotesForCurrent();

      nomTitle.textContent = nom.title;
      nomSub.textContent = nom.subtitle;
      nomCounter.textContent = `${currentNomIndex + 1} / ${NOMINATIONS.length}`;
      prevNomBtn.disabled = (currentNomIndex === 0);
      nextNomBtn.disabled = (currentNomIndex === NOMINATIONS.length - 1);

      // Кандидаты
      candidatesContainer.innerHTML = '';
      nom.candidates.forEach((candidate, idx) => {
        const isSelected = (selectedCandidateId === idx);
        const item = document.createElement('div');
        item.className = `candidate-item${isSelected ? ' selected' : ''}`;

        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'candidate';
        radio.value = idx;
        radio.checked = isSelected;
        radio.id = `cand_${idx}`;

        const label = document.createElement('label');
        label.htmlFor = `cand_${idx}`;
        label.textContent = candidate;

        item.appendChild(radio);
        item.appendChild(label);

        item.addEventListener('click', (e) => {
          if (e.target.tagName !== 'INPUT') {
            radio.checked = true;
            const ev = new Event('change', { bubbles: true });
            radio.dispatchEvent(ev);
          }
        });

        radio.addEventListener('change', (e) => {
          if (e.target.checked) {
            document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            selectedCandidateId = idx;
            selectedHint.textContent = `✅ «${candidate}»`;
            voteBtn.disabled = false;
            statusText.textContent = '📌 Выбран кандидат. Нажмите «Голосовать»';
          }
        });

        candidatesContainer.appendChild(item);
      });

      // Результаты
      if (total > 0) {
        resultsBlock.style.display = 'block';
        resultsBlock.innerHTML = '';
        nom.candidates.forEach((candidate, idx) => {
          const percent = (currentVotes[idx] / total) * 100;
          const row = document.createElement('div');
          row.className = 'result-row';
          row.innerHTML = `
            <span class="name">${candidate}</span>
            <div class="bar-wrapper">
              <div class="bar-fill" style="width: ${percent}%"></div>
            </div>
            <span class="percent">${Math.round(percent)}%</span>
          `;
          resultsBlock.appendChild(row);
        });
      } else {
        resultsBlock.style.display = 'none';
      }

      totalVotesSpan.textContent = `${total} ${total % 10 === 1 && total % 100 !== 11 ? 'голос' : total % 10 >= 2 && total % 10 <= 4 && (total % 100 < 10 || total % 100 >= 20) ? 'голоса' : 'голосов'}`;

      if (selectedCandidateId === null) {
        voteBtn.disabled = true;
        selectedHint.textContent = '—';
        statusText.textContent = total === 0 ? '💡 Выберите кандидата и нажмите «Голосовать»' : '📊 Выберите кандидата для голосования';
      } else {
        voteBtn.disabled = false;
        if (total > 0) {
          statusText.textContent = '📌 Выберите кандидата для голосования (или сбросьте)';
        } else {
          statusText.textContent = '💡 Выберите кандидата и нажмите «Голосовать»';
        }
      }

      saveVotes();
    }

    // Голосование
    function handleVote() {
      if (selectedCandidateId === null) return;
      const nom = getCurrentNom();
      const currentVotes = votes[nom.id];
      if (!currentVotes) return;
      currentVotes[selectedCandidateId] += 1;
      selectedCandidateId = null;
      document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
      document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
      voteBtn.disabled = true;
      selectedHint.textContent = '—';
      statusText.textContent = '✅ Голос учтён! Выберите другого кандидата или переключите номинацию.';
      render();
    }

    // Сброс текущей номинации
    function handleReset() {
      const nom = getCurrentNom();
      const total = getTotalVotesForCurrent();
      if (total === 0) {
        selectedCandidateId = null;
        document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
        document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
        voteBtn.disabled = true;
        selectedHint.textContent = '—';
        statusText.textContent = '💡 Выберите кандидата';
        render();
        return;
      }
      if (confirm(`Сбросить все голоса в номинации «${nom.title}»?`)) {
        const currentVotes = votes[nom.id];
        for (let i = 0; i < currentVotes.length; i++) currentVotes[i] = 0;
        selectedCandidateId = null;
        document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
        document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
        voteBtn.disabled = true;
        selectedHint.textContent = '—';
        statusText.textContent = '🔄 Голоса обнулены. Выберите кандидата.';
        render();
      }
    }

    function goToNom(index) {
      if (index < 0 || index >= NOMINATIONS.length) return;
      currentNomIndex = index;
      selectedCandidateId = null;
      document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
      document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
      voteBtn.disabled = true;
      selectedHint.textContent = '—';
      statusText.textContent = '💡 Выберите кандидата и нажмите «Голосовать»';
      render();
    }

    function init() {
      loadVotes();
      currentNomIndex = 0;
      selectedCandidateId = null;
      render();

      voteBtn.addEventListener('click', handleVote);
      resetBtn.addEventListener('click', handleReset);
      prevNomBtn.addEventListener('click', () => goToNom(currentNomIndex - 1));
      nextNomBtn.addEventListener('click', () => goToNom(currentNomIndex + 1));
    }

    init();
  })();
</script>
</body>
</html>

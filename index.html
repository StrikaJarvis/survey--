<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyash Awards · Голосование</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    /* ====== СТИЛИ (чёрный фон, эндер-столбы, адаптив) ====== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --card-bg: rgba(16, 16, 20, 0.88);
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --text-muted: #777777;
      --border-light: rgba(255,255,255,0.06);
      --radius: 28px;
      --radius-sm: 40px;
      --transition: 0.25s ease;
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      position: relative;
      overflow-x: hidden;
    }
    .ender-pillars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .pillar {
      position: absolute;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to top, rgba(255,255,255,0) 0%, rgba(200,200,255,0.2) 50%, rgba(255,255,255,0.6) 85%, rgba(255,255,255,0.9) 100%);
      border-radius: 2px;
      animation: glowPulse 4s infinite alternate ease-in-out;
      box-shadow: 0 0 15px rgba(255,255,255,0.08), 0 0 40px rgba(200,200,255,0.03);
    }
    .pillar:nth-child(odd) { animation-duration: 5s; }
    .pillar:nth-child(3n) { animation-duration: 6s; animation-delay: 0.6s; }
    .pillar:nth-child(5n+2) { animation-duration: 3.8s; animation-delay: 1.2s; }
    .pillar:nth-child(7n+4) { animation-duration: 7s; animation-delay: 0.3s; }
    @keyframes glowPulse {
      0% { opacity: 0.25; filter: brightness(0.5); }
      100% { opacity: 0.9; filter: brightness(1.3); }
    }
    .poll-wrapper {
      position: relative;
      z-index: 1;
      max-width: 820px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius);
      padding: 40px 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      border: 1px solid var(--border-light);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 20px;
    }
    .header .shield { font-size: 2.6rem; opacity: 0.8; }
    .header h1 { font-size: 2.0rem; font-weight: 700; letter-spacing: -0.5px; }
    .header .year {
      font-size: 0.9rem;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      padding: 4px 16px;
      border-radius: 40px;
      color: var(--text-secondary);
      margin-left: auto;
      border: 1px solid var(--border-light);
    }
    .step {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .step.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .step-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      border-left: 4px solid rgba(255,255,255,0.3);
      padding-left: 16px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .form-group input {
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-light);
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      transition: var(--transition);
    }
    .form-group input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08);
    }
    .form-group .error {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 4px;
    }
    .form-group .hint {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }
    .btn {
      border: none;
      padding: 14px 36px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.3px;
      background: rgba(255,255,255,0.06);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
    }
    .btn-primary {
      background: #fff;
      color: #0a0a0a;
      border-color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #e0e0e0;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,255,255,0.1);
    }
    .btn-primary:disabled { opacity: 0.3; pointer-events: none; }
    .btn-secondary {
      background: transparent;
      border-color: rgba(255,255,255,0.15);
      color: var(--text-secondary);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.3);
    }
    .btn-sm { padding: 10px 20px; font-size: 0.85rem; }
    .nomination-item {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
    }
    .nomination-item:last-child { border-bottom: none; }
    .nomination-item .nom-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .nomination-item .nom-sub {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .candidate-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }
    .candidate-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-radius: 40px;
      background: rgba(255,255,255,0.03);
      transition: var(--transition);
      cursor: pointer;
    }
    .candidate-option:hover { background: rgba(255,255,255,0.07); }
    .candidate-option input[type="radio"] {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      flex-shrink: 0;
      background: transparent;
      transition: 0.15s;
    }
    .candidate-option input[type="radio"]:checked {
      border-color: #fff;
      background: #fff;
      box-shadow: inset 0 0 0 5px #0a0a0a, 0 0 0 1px #fff;
    }
    .candidate-option label { flex: 1; cursor: pointer; }
    .custom-answer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-radius: 40px;
      background: rgba(255,255,255,0.03);
    }
    .custom-answer input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-light);
      padding: 6px 0;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .custom-answer input[type="text"]:focus {
      outline: none;
      border-bottom-color: rgba(255,255,255,0.5);
    }
    .custom-answer .custom-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .nomination-status {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .mt-20 { margin-top: 20px; }
    .final-message {
      text-align: center;
      padding: 30px 0;
    }
    .final-message .big-icon { font-size: 4rem; }
    .final-message h2 { font-size: 2rem; margin: 16px 0; }
    .final-message p { color: var(--text-secondary); }
    .admin-panel {
      margin-top: 30px;
      border-top: 1px solid var(--border-light);
      padding-top: 16px;
      text-align: center;
    }
    .admin-panel .admin-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition);
      padding: 6px 12px;
      border-radius: 40px;
    }
    .admin-panel .admin-toggle:hover {
      background: rgba(255,255,255,0.04);
      color: #fff;
    }
    .admin-content {
      display: none;
      margin-top: 20px;
      text-align: left;
    }
    .admin-content.active { display: block; }
    .admin-login {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.02);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
    }
    .admin-login input {
      flex: 1;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-light);
      color: #fff;
      font-family: inherit;
    }
    .admin-login input:focus { outline: none; border-color: rgba(255,255,255,0.4); }
    .admin-login .error { color: #ff6b6b; font-size: 0.85rem; }
    .admin-dashboard {
      display: none;
      background: rgba(0,0,0,0.3);
      border-radius: var(--radius-sm);
      padding: 16px;
      border: 1px solid var(--border-light);
    }
    .admin-dashboard.active { display: block; }
    .admin-dashboard h3 {
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }
    .admin-table-wrap {
      overflow-x: auto;
      margin-top: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.06);
      text-align: left;
      vertical-align: top;
    }
    th {
      background: rgba(255,255,255,0.04);
      font-weight: 600;
      color: var(--text-secondary);
    }
    td { color: var(--text-primary); }
    .admin-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    @media (max-width: 600px) {
      .poll-wrapper { padding: 24px 16px; }
      .header h1 { font-size: 1.5rem; }
      .header .shield { font-size: 2rem; }
      .btn { padding: 12px 24px; font-size: 0.9rem; width: 100%; justify-content: center; }
      .flex-between { flex-direction: column; align-items: stretch; }
      .admin-login { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="ender-pillars" id="pillarsContainer"></div>

<div class="poll-wrapper">
  <div class="header">
    <span class="shield">🐾</span>
    <h1>Nyash Awards</h1>
    <span class="year">2026</span>
  </div>

  <!-- ШАГ 1: Регистрация -->
  <div class="step active" id="stepRegister">
    <div class="step-title">✏️ Представьтесь</div>
    <div class="form-group">
      <label>Ваш ник на сервере</label>
      <input type="text" id="playerNick" placeholder="Введите ник" />
      <div class="error" id="nickError"></div>
    </div>
    <div class="form-group">
      <label>Ваша почта</label>
      <input type="email" id="playerEmail" placeholder="example@mail.com" />
      <div class="error" id="emailError"></div>
    </div>
    <button class="btn btn-primary" id="getCodeBtn">Получить код →</button>
  </div>

  <!-- ШАГ 2: Подтверждение -->
  <div class="step" id="stepVerify">
    <div class="step-title">🔑 Подтверждение</div>
    <p style="color: var(--text-secondary); margin-bottom: 16px;">Введите код, отправленный на вашу почту</p>
    <div class="form-group">
      <label>Код из письма</label>
      <input type="text" id="verifyCode" placeholder="Введите 6-значный код" maxlength="6" inputmode="numeric" />
      <div class="error" id="codeError"></div>
      <div class="hint" id="codeHint"></div>
    </div>
    <div id="demoCodeBlock" style="display: none; background: rgba(255,255,255,0.04); padding: 12px 20px; border-radius: var(--radius-sm); border: 1px solid var(--border-light); text-align: center; margin-bottom: 16px;">
      <span style="color: var(--text-muted);">Демо-режим: ваш код</span>
      <div style="font-size: 2rem; font-weight: 700; letter-spacing: 8px; color: #fff; margin-top: 4px;" id="demoCodeDisplay">------</div>
    </div>
    <button class="btn btn-primary" id="verifyBtn">Подтвердить</button>
    <button class="btn btn-secondary" id="backToRegisterBtn" style="margin-left: 12px;">Назад</button>
  </div>

  <!-- ШАГ 3: Опрос -->
  <div class="step" id="stepSurvey">
    <div class="step-title">📋 Опрос</div>
    <div id="surveyContainer"></div>
    <div class="flex-between mt-20">
      <span id="progressText" style="color: var(--text-secondary);">0 / 14</span>
      <button class="btn btn-primary" id="submitSurveyBtn" disabled>Завершить опрос</button>
    </div>
  </div>

  <!-- ШАГ 4: Финал -->
  <div class="step" id="stepFinal">
    <div class="final-message">
      <div class="big-icon">🎉</div>
      <h2>Вы приглашены на Nyash Awards!</h2>
      <p>Спасибо за ваши ответы. Ждём вас на церемонии!</p>
    </div>
  </div>

  <!-- Админ-панель -->
  <div class="admin-panel">
    <button class="admin-toggle" id="adminToggleBtn">🔐 Админ-панель</button>
    <div class="admin-content" id="adminContent">
      <div class="admin-login" id="adminLogin">
        <input type="password" id="adminPassword" placeholder="Введите пароль" />
        <button class="btn btn-secondary btn-sm" id="adminLoginBtn">Войти</button>
        <span class="error" id="adminLoginError"></span>
      </div>
      <div class="admin-dashboard" id="adminDashboard">
        <h3>📋 Список участников</h3>
        <div class="admin-table-wrap">
          <table>
            <thead><tr><th>Ник</th><th>Почта</th><th>Ответы</th></tr></thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
        <div class="admin-actions">
          <button class="btn btn-secondary btn-sm" id="exportJsonBtn">📥 Скачать JSON</button>
          <button class="btn btn-secondary btn-sm" id="adminLogoutBtn">Выйти</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // =============================================================
  //  EMAILJS – ВСЕ КЛЮЧИ ВСТАВЛЕНЫ
  // =============================================================
  const EMAILJS_CONFIG = {
    USE_EMAILJS: true,                     // true – реальная отправка, false – демо
    SERVICE_ID: 'service_nek463y',        // ваш Service ID
    TEMPLATE_ID: 'template_tpjpo6c',      // ваш Template ID
    USER_ID: 'sCSwstC3SHqXGkniw'          // ваш Public Key
  };

  // =============================================================
  //  1. Генерация эндер-столбов
  // =============================================================
  (function createPillars() {
    const container = document.getElementById('pillarsContainer');
    const count = 18;
    for (let i = 0; i < count; i++) {
      const pillar = document.createElement('div');
      pillar.className = 'pillar';
      const left = 15 + Math.random() * 70;
      const height = 30 + Math.random() * 70;
      const width = 1.5 + Math.random() * 3;
      const delay = (Math.random() * 6).toFixed(2);
      const duration = 3 + Math.random() * 5;
      pillar.style.left = left + '%';
      pillar.style.height = height + '%';
      pillar.style.width = width + 'px';
      pillar.style.animationDelay = delay + 's';
      pillar.style.animationDuration = duration + 's';
      container.appendChild(pillar);
    }
  })();

  // =============================================================
  //  2. Данные номинаций (14)
  // =============================================================
  const NOMINATIONS = [
    { id: 'best_player', title: '🏅 Лучший игрок сезона', subtitle: 'Кто показал наилучшую игру?', candidates: ['Алексей_99', 'Vortex', 'ShadowMaster', 'CrafterPro'] },
    { id: 'best_builder', title: '🏗️ Лучший строитель', subtitle: 'Чьи постройки впечатлили всех?', candidates: ['PixelArtisan', 'BlockWizard', 'MegaBuild', 'ArchitectFox'] },
    { id: 'best_pvp', title: '⚔️ Лучший PvP-игрок', subtitle: 'Кто сильнейший на арене?', candidates: ['KillerBee', 'PvPKing', 'ArenaMaster', 'StrikerX'] },
    { id: 'best_event', title: '🎉 Лучший ивент сезона', subtitle: 'Какое событие вам запомнилось?', candidates: ['Охота на дракона', 'Турнир лучников', 'Постройка города', 'Новогодний карнавал'] },
    { id: 'best_art', title: '🎨 Человек искусства', subtitle: 'Кто создал самый красивый арт?', candidates: ['ArtMage', 'PixelPainter', 'SketchMaster', 'ColorWeaver'] },
    { id: 'best_admin', title: '🛡️ Лучший администратор', subtitle: 'Кто внёс наибольший вклад в порядок?', candidates: ['Admin_Prime', 'GuardianX', 'CraftManager', 'RuleKeeper'] },
    { id: 'best_pve', title: '🧟 Лучший PvE-игрок', subtitle: 'Кто покорял данжи и боссов?', candidates: ['DungeonCrawler', 'BossSlayer', 'MobMaster', 'RaidLeader'] },
    { id: 'best_noob', title: '🌱 Лучший новичок', subtitle: 'Кто быстро вырос и впечатлил?', candidates: ['NewbiePro', 'FreshStart', 'RookieStar', 'BeginnerKing'] },
    { id: 'best_project', title: '📐 Лучший проект', subtitle: 'Какое коллективное творение достойно награды?', candidates: ['Подземный город', 'Летающий остров', 'Аквапарк', 'Храм солнца'] },
    { id: 'best_farming', title: '🌾 Лучший фармер', subtitle: 'Кто собрал больше всего ресурсов?', candidates: ['FarmLord', 'HarvestKing', 'CropMaster', 'MinerPro'] },
    { id: 'best_redstone', title: '🔌 Лучший редстоун-инженер', subtitle: 'Чьи механизмы поражают воображение?', candidates: ['RedstoneWiz', 'LogicMaster', 'CircuitPro', 'MechBuilder'] },
    { id: 'best_team', title: '🤝 Лучшая PvE-команда', subtitle: 'Какая команда показала лучшую слаженность?', candidates: ['DragonSlayers', 'ShadowCrew', 'PhoenixRaid', 'IronClan'] },
    { id: 'best_guildmaster', title: '🏰 Лучший глава гильдии', subtitle: 'Кто вдохновляет и объединяет игроков?', candidates: ['GuildMaster_1', 'LeaderPro', 'ClanChief', 'OrderKeeper'] },
    { id: 'best_active', title: '🔥 Самый активный игрок', subtitle: 'Кто был на сервере чаще всех?', candidates: ['AlwaysOnline', 'NoLifeKing', 'GrindMachine', 'ActivityStar'] }
  ];

  // =============================================================
  //  3. Состояние приложения
  // =============================================================
  const ADMIN_PASSWORD = 'admin123';
  let currentPlayer = null;
  let allPlayers = [];
  let pendingNick = '';
  let pendingEmail = '';
  let generatedCode = '';
  let codeVerified = false;

  // DOM
  const stepRegister = document.getElementById('stepRegister');
  const stepVerify = document.getElementById('stepVerify');
  const stepSurvey = document.getElementById('stepSurvey');
  const stepFinal = document.getElementById('stepFinal');
  const playerNick = document.getElementById('playerNick');
  const playerEmail = document.getElementById('playerEmail');
  const nickError = document.getElementById('nickError');
  const emailError = document.getElementById('emailError');
  const getCodeBtn = document.getElementById('getCodeBtn');
  const verifyCode = document.getElementById('verifyCode');
  const codeError = document.getElementById('codeError');
  const codeHint = document.getElementById('codeHint');
  const demoCodeBlock = document.getElementById('demoCodeBlock');
  const demoCodeDisplay = document.getElementById('demoCodeDisplay');
  const verifyBtn = document.getElementById('verifyBtn');
  const backToRegisterBtn = document.getElementById('backToRegisterBtn');
  const surveyContainer = document.getElementById('surveyContainer');
  const progressText = document.getElementById('progressText');
  const submitBtn = document.getElementById('submitSurveyBtn');
  const adminToggleBtn = document.getElementById('adminToggleBtn');
  const adminContent = document.getElementById('adminContent');
  const adminLogin = document.getElementById('adminLogin');
  const adminDashboard = document.getElementById('adminDashboard');
  const adminPassword = document.getElementById('adminPassword');
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  const adminLoginError = document.getElementById('adminLoginError');
  const adminTableBody = document.getElementById('adminTableBody');
  const exportJsonBtn = document.getElementById('exportJsonBtn');
  const adminLogoutBtn = document.getElementById('adminLogoutBtn');

  // Загрузка / сохранение
  function loadAllPlayers() {
    const stored = localStorage.getItem('nyash_all_players');
    if (stored) {
      try { allPlayers = JSON.parse(stored); } catch(e) { allPlayers = []; }
    } else { allPlayers = []; }
  }
  function saveAllPlayers() {
    localStorage.setItem('nyash_all_players', JSON.stringify(allPlayers));
  }
  function loadCurrentPlayer() {
    const stored = localStorage.getItem('nyash_current_player');
    if (stored) {
      try { currentPlayer = JSON.parse(stored); } catch(e) { currentPlayer = null; }
    } else { currentPlayer = null; }
  }
  function saveCurrentPlayer() {
    if (currentPlayer) {
      localStorage.setItem('nyash_current_player', JSON.stringify(currentPlayer));
    } else {
      localStorage.removeItem('nyash_current_player');
    }
  }
  function findPlayerByNickOrEmail(nick, email) {
    return allPlayers.find(p => p.nick.toLowerCase() === nick.toLowerCase() || p.email.toLowerCase() === email.toLowerCase());
  }

  function showStep(step) {
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    if (step === 'register') stepRegister.classList.add('active');
    else if (step === 'verify') stepVerify.classList.add('active');
    else if (step === 'survey') stepSurvey.classList.add('active');
    else if (step === 'final') stepFinal.classList.add('active');
  }

  // =============================================================
  //  4. Генерация и отправка кода (исправлено – теперь params совпадают с шаблоном)
  // =============================================================
  function generateCode() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  async function sendCode(email, nick, code) {
    if (EMAILJS_CONFIG.USE_EMAILJS) {
      try {
        // Инициализация (можно один раз, но оставим здесь на случай)
        await emailjs.init(EMAILJS_CONFIG.USER_ID);
        const params = {
          nick: nick,          // ← совпадает с {{nick}} в шаблоне
          code: code,          // ← совпадает с {{code}} в шаблоне
          // Если в шаблоне есть другие переменные, добавьте их сюда
          to_email: email,     // если хотите использовать в письме
          from_name: 'Nyash Awards'
        };
        const response = await emailjs.send(
          EMAILJS_CONFIG.SERVICE_ID,
          EMAILJS_CONFIG.TEMPLATE_ID,
          params
        );
        console.log('EmailJS ответ:', response);
        return true;
      } catch (err) {
        console.error('EmailJS ошибка:', err);
        // Показываем подробную ошибку в alert
        alert('Ошибка отправки: ' + (err.text || err.message || 'неизвестная ошибка'));
        return false;
      }
    } else {
      // Демо-режим – всегда успешно
      return true;
    }
  }

  // =============================================================
  //  5. Обработчики регистрации и кода
  // =============================================================
  getCodeBtn.addEventListener('click', async function() {
    const nick = playerNick.value.trim();
    const email = playerEmail.value.trim();
    let valid = true;
    nickError.textContent = '';
    emailError.textContent = '';

    if (!nick) {
      nickError.textContent = 'Введите ник';
      valid = false;
    }
    if (!email) {
      emailError.textContent = 'Введите почту';
      valid = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailError.textContent = 'Введите корректную почту (например, name@domain.com)';
      valid = false;
    }

    if (!valid) return;

    // Проверяем, не проходил ли уже опрос
    const existing = findPlayerByNickOrEmail(nick, email);
    if (existing) {
      if (existing.completed) {
        alert('Вы уже проходили опрос!');
        currentPlayer = existing;
        saveCurrentPlayer();
        showStep('final');
        return;
      } else {
        // Удаляем незавершённого дубля
        const idx = allPlayers.findIndex(p => p.nick === existing.nick && p.email === existing.email);
        if (idx !== -1) allPlayers.splice(idx, 1);
        saveAllPlayers();
      }
    }

    pendingNick = nick;
    pendingEmail = email;
    generatedCode = generateCode();

    const sent = await sendCode(email, nick, generatedCode);
    if (!sent && EMAILJS_CONFIG.USE_EMAILJS) {
      // Ошибка уже показана в alert внутри sendCode
      return;
    }

    if (!EMAILJS_CONFIG.USE_EMAILJS) {
      demoCodeBlock.style.display = 'block';
      demoCodeDisplay.textContent = generatedCode;
      codeHint.textContent = '📨 (демо) Код отправлен на экран, введите его ниже';
    } else {
      demoCodeBlock.style.display = 'none';
      codeHint.textContent = '✉️ Код отправлен на вашу почту';
    }

    showStep('verify');
    verifyCode.value = '';
    codeError.textContent = '';
  });

  verifyBtn.addEventListener('click', function() {
    const entered = verifyCode.value.trim();
    if (!entered) {
      codeError.textContent = 'Введите код';
      return;
    }
    if (entered === generatedCode) {
      codeVerified = true;
      currentPlayer = {
        nick: pendingNick,
        email: pendingEmail,
        answers: {},
        completed: false,
        verified: true
      };
      allPlayers.push(currentPlayer);
      saveAllPlayers();
      saveCurrentPlayer();
      showStep('survey');
      renderSurvey();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      codeError.textContent = 'Неверный код. Попробуйте ещё раз.';
    }
  });

  backToRegisterBtn.addEventListener('click', function() {
    showStep('register');
    codeError.textContent = '';
    verifyCode.value = '';
    demoCodeBlock.style.display = 'none';
  });

  // =============================================================
  //  6. Рендеринг опроса
  // =============================================================
  function renderSurvey() {
    if (!currentPlayer) return;
    const answers = currentPlayer.answers || {};
    let html = '';
    let answeredCount = 0;

    NOMINATIONS.forEach((nom) => {
      const answer = answers[nom.id] || null;
      const isAnswered = answer !== null;
      if (isAnswered) answeredCount++;

      html += `<div class="nomination-item" data-nom-id="${nom.id}">`;
      html += `<div class="nom-title">${nom.title}</div>`;
      html += `<div class="nom-sub">${nom.subtitle}</div>`;
      html += `<div class="candidate-options">`;
      nom.candidates.forEach(cand => {
        const checked = (answer && answer.type === 'candidate' && answer.value === cand) ? 'checked' : '';
        html += `
          <div class="candidate-option">
            <input type="radio" name="nom_${nom.id}" value="${cand}" ${checked} data-nom="${nom.id}" />
            <label>${cand}</label>
          </div>
        `;
      });
      html += `</div>`;
      const customVal = (answer && answer.type === 'custom') ? answer.value : '';
      html += `
        <div class="custom-answer">
          <span class="custom-label">Свой вариант:</span>
          <input type="text" class="custom-input" data-nom="${nom.id}" placeholder="Напишите свой ответ" value="${customVal}" />
        </div>
      `;
      html += `<div class="nomination-status">${isAnswered ? '✅ Отвечено' : '⏳ Ожидает ответа'}</div>`;
      html += `</div>`;
    });

    surveyContainer.innerHTML = html;
    progressText.textContent = `${answeredCount} / ${NOMINATIONS.length}`;
    submitBtn.disabled = (answeredCount < NOMINATIONS.length);

    document.querySelectorAll('.candidate-option input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const nomId = this.dataset.nom;
        const customInput = document.querySelector(`.custom-input[data-nom="${nomId}"]`);
        if (this.checked) {
          customInput.value = '';
          saveAnswer(nomId, { type: 'candidate', value: this.value });
        }
      });
    });

    document.querySelectorAll('.custom-input').forEach(input => {
      input.addEventListener('input', function() {
        const nomId = this.dataset.nom;
        const radios = document.querySelectorAll(`input[name="nom_${nomId}"]`);
        radios.forEach(r => r.checked = false);
        const val = this.value.trim();
        if (val) {
          saveAnswer(nomId, { type: 'custom', value: val });
        } else {
          removeAnswer(nomId);
        }
        updateSurveyStatus();
      });
    });

    updateSurveyStatus();
  }

  function saveAnswer(nomId, answer) {
    if (!currentPlayer) return;
    if (!currentPlayer.answers) currentPlayer.answers = {};
    currentPlayer.answers[nomId] = answer;
    saveCurrentPlayer();
    const idx = allPlayers.findIndex(p => p.nick === currentPlayer.nick && p.email === currentPlayer.email);
    if (idx !== -1) {
      allPlayers[idx].answers = currentPlayer.answers;
      saveAllPlayers();
    }
    updateSurveyStatus();
  }

  function removeAnswer(nomId) {
    if (!currentPlayer) return;
    if (currentPlayer.answers) {
      delete currentPlayer.answers[nomId];
      saveCurrentPlayer();
      const idx = allPlayers.findIndex(p => p.nick === currentPlayer.nick && p.email === currentPlayer.email);
      if (idx !== -1) {
        allPlayers[idx].answers = currentPlayer.answers;
        saveAllPlayers();
      }
    }
    updateSurveyStatus();
  }

  function updateSurveyStatus() {
    if (!currentPlayer) return;
    const answers = currentPlayer.answers || {};
    let answeredCount = 0;
    NOMINATIONS.forEach(nom => {
      if (answers[nom.id]) answeredCount++;
    });
    progressText.textContent = `${answeredCount} / ${NOMINATIONS.length}`;
    submitBtn.disabled = (answeredCount < NOMINATIONS.length);
    document.querySelectorAll('.nomination-item').forEach(item => {
      const nomId = item.dataset.nomId;
      const statusDiv = item.querySelector('.nomination-status');
      if (statusDiv) {
        statusDiv.textContent = answers[nomId] ? '✅ Отвечено' : '⏳ Ожидает ответа';
      }
    });
  }

  // =============================================================
  //  7. Завершение опроса
  // =============================================================
  function finishSurvey() {
    if (!currentPlayer) return;
    const answers = currentPlayer.answers || {};
    const allAnswered = NOMINATIONS.every(nom => answers[nom.id] !== undefined && answers[nom.id] !== null);
    if (!allAnswered) {
      alert('Ответьте на все вопросы!');
      return;
    }
    currentPlayer.completed = true;
    saveCurrentPlayer();
    const idx = allPlayers.findIndex(p => p.nick === currentPlayer.nick && p.email === currentPlayer.email);
    if (idx !== -1) {
      allPlayers[idx].completed = true;
      saveAllPlayers();
    }
    showStep('final');
  }

  submitBtn.addEventListener('click', finishSurvey);

  // =============================================================
  //  8. Админ-панель
  // =============================================================
  let adminLoggedIn = false;

  function renderAdminTable() {
    const tbody = adminTableBody;
    tbody.innerHTML = '';
    if (allPlayers.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: var(--text-muted);">Нет данных</td></tr>';
      return;
    }
    allPlayers.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${p.nick}</td><td>${p.email}</td>`;
      let answersHtml = '';
      if (p.answers) {
        NOMINATIONS.forEach(nom => {
          const a = p.answers[nom.id];
          if (a) {
            const val = a.type === 'candidate' ? a.value : `(свой) ${a.value}`;
            answersHtml += `<div><strong>${nom.title}</strong>: ${val}</div>`;
          } else {
            answersHtml += `<div><strong>${nom.title}</strong>: <span style="color:var(--text-muted);">не отвечено</span></div>`;
          }
        });
      } else {
        answersHtml = '<span style="color:var(--text-muted);">нет ответов</span>';
      }
      const td = document.createElement('td');
      td.innerHTML = answersHtml;
      tr.appendChild(td);
      tbody.appendChild(tr);
    });
  }

  function exportJson() {
    const data = JSON.stringify(allPlayers, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'nyash_awards_data.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function adminLoginHandler() {
    const pass = adminPassword.value.trim();
    if (pass === ADMIN_PASSWORD) {
      adminLoggedIn = true;
      adminLogin.style.display = 'none';
      adminDashboard.classList.add('active');
      adminLoginError.textContent = '';
      renderAdminTable();
    } else {
      adminLoginError.textContent = 'Неверный пароль';
    }
  }

  function adminLogout() {
    adminLoggedIn = false;
    adminLogin.style.display = 'flex';
    adminDashboard.classList.remove('active');
    adminPassword.value = '';
    adminLoginError.textContent = '';
    adminContent.classList.remove('active');
    adminToggleBtn.textContent = '🔐 Админ-панель';
  }

  adminToggleBtn.addEventListener('click', function() {
    const isActive = adminContent.classList.toggle('active');
    if (isActive) {
      adminToggleBtn.textContent = '🔒 Скрыть админ-панель';
      if (!adminLoggedIn) {
        adminLogin.style.display = 'flex';
        adminDashboard.classList.remove('active');
      } else {
        adminLogin.style.display = 'none';
        adminDashboard.classList.add('active');
        renderAdminTable();
      }
    } else {
      adminToggleBtn.textContent = '🔐 Админ-панель';
      adminLogout();
    }
  });

  adminLoginBtn.addEventListener('click', adminLoginHandler);
  adminPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') adminLoginHandler(); });
  adminLogoutBtn.addEventListener('click', adminLogout);
  exportJsonBtn.addEventListener('click', exportJson);

  // =============================================================
  //  9. Инициализация
  // =============================================================
  function initApp() {
    loadAllPlayers();
    loadCurrentPlayer();

    if (currentPlayer) {
      if (currentPlayer.completed) {
        showStep('final');
      } else if (currentPlayer.verified) {
        showStep('survey');
        renderSurvey();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        localStorage.removeItem('nyash_current_player');
        currentPlayer = null;
        showStep('register');
      }
    } else {
      showStep('register');
    }

    if (EMAILJS_CONFIG.USE_EMAILJS) {
      emailjs.init(EMAILJS_CONFIG.USER_ID);
    }
  }

  document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>

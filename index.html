<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shield Awards 2026 — Голосование</title>
  <style>
    /* --------------------------------------------
       Базовый стиль — MineShield тема
    -------------------------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1d1f22;
      background-image: radial-gradient(circle at 20% 30%, #2a2e33 0%, #141618 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Courier New', 'Segoe UI', monospace;
      color: #e0e4eb;
    }

    /* Главный блок */
    .poll-wrapper {
      max-width: 800px;
      width: 100%;
      background: #25282e;
      border: 4px solid #3a7d44;
      border-radius: 20px;
      padding: 30px 25px 20px;
      box-shadow: 0 12px 0 #1e3a23, 0 20px 40px rgba(0,0,0,0.7);
      position: relative;
    }

    /* Шапка */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      border-bottom: 3px solid #3a7d44;
      padding-bottom: 16px;
    }

    .header .shield {
      font-size: 2.8rem;
      line-height: 1;
      filter: drop-shadow(0 4px 0 #1e3a23);
    }

    .header h1 {
      font-size: 2.0rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b7d7a8;
      text-shadow: 0 4px 0 #1e3a23;
      margin: 0;
    }

    .header .year {
      font-size: 1.1rem;
      background: #3a7d44;
      padding: 4px 16px;
      border-radius: 40px;
      color: #d4edc9;
      font-weight: bold;
      margin-left: auto;
      border: 2px solid #6a9e6f;
      box-shadow: inset 0 -3px 0 #1e4a24;
    }

    /* Навигация по номинациям */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e2126;
      padding: 8px 16px;
      border-radius: 60px;
      margin: 18px 0 22px;
      border: 2px solid #3a5a44;
    }

    .nav-bar .nav-btn {
      background: #3a5a44;
      border: none;
      color: #e0e4eb;
      font-size: 1.4rem;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s ease;
      box-shadow: 0 4px 0 #1e3a23;
      font-family: inherit;
    }

    .nav-bar .nav-btn:hover {
      background: #4d7a5a;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #1e3a23;
    }

    .nav-bar .nav-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #1e3a23;
    }

    .nav-bar .nav-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
      transform: none;
    }

    .nav-bar .nomination-counter {
      font-size: 1.0rem;
      background: #141618;
      padding: 4px 18px;
      border-radius: 40px;
      border: 2px solid #3a5a44;
      color: #b7d7a8;
      font-weight: bold;
    }

    /* Блок вопроса */
    .question-block {
      background: #1e2126;
      padding: 20px 22px;
      border-radius: 18px;
      border-left: 6px solid #3a7d44;
      margin-bottom: 28px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
    }

    .question-block .nomination-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #d4edc9;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .question-block .nomination-sub {
      font-size: 0.9rem;
      color: #8baa92;
      border-left: 3px solid #3a7d44;
      padding-left: 14px;
      margin-top: 2px;
    }

    /* Список кандидатов */
    .candidates {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 16px 0 20px;
    }

    .candidate-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #2a2e35;
      padding: 12px 18px 12px 16px;
      border-radius: 60px;
      border: 2px solid #3a4a44;
      transition: all 0.15s ease;
      cursor: pointer;
    }

    .candidate-item:hover {
      border-color: #6a9e6f;
      background: #31363e;
      transform: scale(1.01);
    }

    .candidate-item.selected {
      border-color: #7cb342;
      background: #2f4035;
      box-shadow: 0 0 0 3px rgba(124, 179, 66, 0.3);
    }

    .candidate-item input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border: 3px solid #5a6f5e;
      border-radius: 50%;
      flex-shrink: 0;
      background: #1e2126;
      transition: 0.1s;
      position: relative;
      cursor: pointer;
    }

    .candidate-item input[type="radio"]:checked {
      border-color: #7cb342;
      background: #7cb342;
      box-shadow: inset 0 0 0 6px #1e2126, 0 0 0 2px #7cb342;
    }

    .candidate-item label {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 500;
      color: #d4e0d4;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    /* Блок результатов */
    .results-block {
      margin: 10px 0 18px;
      padding: 12px 14px;
      background: #1a1d22;
      border-radius: 30px;
      border: 2px solid #3a5a44;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 8px;
      border-bottom: 1px solid #2a3238;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-row .name {
      flex: 0 0 140px;
      font-weight: 500;
      color: #b7d7a8;
      font-size: 0.95rem;
    }

    .result-row .bar-wrapper {
      flex: 1;
      height: 12px;
      background: #2a3238;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    .result-row .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3a7d44, #6a9e6f);
      border-radius: 40px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .result-row .percent {
      min-width: 50px;
      text-align: right;
      font-weight: 600;
      color: #d4edc9;
      font-size: 0.95rem;
    }

    /* Кнопки действий */
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-top: 6px;
    }

    .btn {
      background: #3a5a44;
      border: none;
      padding: 14px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.0rem;
      color: #e0e4eb;
      cursor: pointer;
      box-shadow: 0 6px 0 #1e3a23;
      transition: 0.1s ease;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 2px solid #5a7a5e;
    }

    .btn-primary {
      background: #3a7d44;
      border-color: #6a9e6f;
      box-shadow: 0 6px 0 #1e4a24;
    }

    .btn-primary:hover:not(:disabled) {
      background: #4d9a5a;
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #1e4a24;
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(6px);
      box-shadow: 0 0px 0 #1e4a24;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    .btn-secondary {
      background: #2a3238;
      border-color: #4a5a4e;
      box-shadow: 0 6px 0 #14181c;
    }

    .btn-secondary:hover {
      background: #3a4a44;
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #14181c;
    }

    .btn-secondary:active {
      transform: translateY(6px);
      box-shadow: 0 0px 0 #14181c;
    }

    .vote-count {
      background: #14181c;
      padding: 8px 22px;
      border-radius: 60px;
      border: 2px solid #3a5a44;
      font-weight: 600;
      color: #b7d7a8;
      font-size: 0.95rem;
    }

    .status-message {
      margin-top: 18px;
      background: #1a1d22;
      padding: 12px 18px;
      border-radius: 40px;
      border-left: 6px solid #3a7d44;
      color: #b7d7a8;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status-message .hint {
      opacity: 0.7;
      font-weight: 400;
      font-size: 0.9rem;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: #5a6f5e;
      border-top: 2px solid #2a3238;
      padding-top: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Адаптив */
    @media (max-width: 600px) {
      .poll-wrapper { padding: 20px 14px; }
      .header h1 { font-size: 1.5rem; }
      .header .shield { font-size: 2.2rem; }
      .nav-bar { flex-wrap: wrap; justify-content: center; gap: 8px; }
      .candidate-item { padding: 10px 14px; }
      .candidate-item label { font-size: 0.95rem; }
      .result-row .name { flex-basis: 100px; font-size: 0.85rem; }
      .btn { padding: 10px 20px; font-size: 0.9rem; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .vote-count { text-align: center; }
    }
  </style>
</head>
<body>

<div class="poll-wrapper">
  <!-- Шапка -->
  <div class="header">
    <span class="shield">⚔️</span>
    <h1>Shield Awards</h1>
    <span class="year">2026</span>
  </div>

  <!-- Навигация по номинациям -->
  <div class="nav-bar">
    <button class="nav-btn" id="prevNomBtn">◀</button>
    <span class="nomination-counter" id="nomCounter">1 / 5</span>
    <button class="nav-btn" id="nextNomBtn">▶</button>
  </div>

  <!-- Текущая номинация -->
  <div class="question-block">
    <div class="nomination-title" id="nomTitle">🏆 Номинация</div>
    <div class="nomination-sub" id="nomSub">Выберите одного кандидата</div>
  </div>

  <!-- Список кандидатов -->
  <div class="candidates" id="candidatesContainer">
    <!-- Динамически из JS -->
  </div>

  <!-- Блок результатов (показывается после голосования) -->
  <div class="results-block" id="resultsBlock" style="display: none;">
    <!-- Динамически -->
  </div>

  <!-- Действия -->
  <div class="action-bar">
    <button class="btn btn-primary" id="voteBtn">⚡ Отдать голос</button>
    <div style="display: flex; gap: 12px; align-items: center;">
      <button class="btn btn-secondary" id="resetBtn">⟳ Сброс</button>
      <span class="vote-count" id="totalVotes">0 голосов</span>
    </div>
  </div>

  <!-- Статус -->
  <div class="status-message">
    <span id="statusText">💡 Выберите кандидата и нажмите «Отдать голос»</span>
    <span class="hint" id="selectedHint">—</span>
  </div>

  <div class="footer">✦ голосование анонимно ✦ данные в локальном хранилище ✦</div>
</div>

<script>
  (function() {
    // ============================================================
    //  ДАННЫЕ ОПРОСА — отредактируйте этот массив под свои номинации
    // ============================================================
    const NOMINATIONS = [
      {
        id: 'best_player',
        title: '🏅 Лучший игрок сезона',
        subtitle: 'Кто показал наилучшую игру в этом сезоне?',
        candidates: ['Алексей_99', 'Vortex', 'ShadowMaster', 'CrafterPro']
      },
      {
        id: 'best_builder',
        title: '🏗️ Лучший строитель',
        subtitle: 'Чьи постройки впечатлили всех?',
        candidates: ['PixelArtisan', 'BlockWizard', 'MegaBuild', 'ArchitectFox']
      },
      {
        id: 'best_pvp',
        title: '⚔️ Лучший PvP-игрок',
        subtitle: 'Кто сильнейший на арене?',
        candidates: ['KillerBee', 'PvPKing', 'ArenaMaster', 'StrikerX']
      },
      {
        id: 'best_event',
        title: '🎉 Лучший ивент сезона',
        subtitle: 'Какое событие вам запомнилось больше всего?',
        candidates: ['Охота на дракона', 'Турнир лучников', 'Постройка города', 'Новогодний карнавал']
      },
      {
        id: 'best_art',
        title: '🎨 Человек искусства',
        subtitle: 'Кто создал самый красивый арт?',
        candidates: ['ArtMage', 'PixelPainter', 'SketchMaster', 'ColorWeaver']
      }
    ];

    // ============================================================
    //  СОСТОЯНИЕ
    // ============================================================
    let currentNomIndex = 0;              // индекс текущей номинации
    let selectedCandidateId = null;      // id выбранного кандидата (индекс в массиве)
    let votes = {};                      // { nominationId: [число голосов по кандидатам] }

    const STORAGE_KEY = 'shield_awards_votes';

    // DOM элементы
    const nomTitle = document.getElementById('nomTitle');
    const nomSub = document.getElementById('nomSub');
    const candidatesContainer = document.getElementById('candidatesContainer');
    const resultsBlock = document.getElementById('resultsBlock');
    const voteBtn = document.getElementById('voteBtn');
    const resetBtn = document.getElementById('resetBtn');
    const prevNomBtn = document.getElementById('prevNomBtn');
    const nextNomBtn = document.getElementById('nextNomBtn');
    const nomCounter = document.getElementById('nomCounter');
    const totalVotesSpan = document.getElementById('totalVotes');
    const statusText = document.getElementById('statusText');
    const selectedHint = document.getElementById('selectedHint');

    // ============================================================
    //  ЗАГРУЗКА / СОХРАНЕНИЕ
    // ============================================================
    function loadVotes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          // проверим, что для каждой номинации есть массив нужной длины
          let valid = true;
          for (const nom of NOMINATIONS) {
            if (!Array.isArray(parsed[nom.id]) || parsed[nom.id].length !== nom.candidates.length) {
              valid = false;
              break;
            }
          }
          if (valid) {
            votes = parsed;
            return;
          }
        } catch (e) {}
      }
      // инициализация
      votes = {};
      for (const nom of NOMINATIONS) {
        votes[nom.id] = new Array(nom.candidates.length).fill(0);
      }
      saveVotes();
    }

    function saveVotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
    }

    // ============================================================
    //  ПОЛУЧЕНИЕ ДАННЫХ
    // ============================================================
    function getCurrentNom() {
      return NOMINATIONS[currentNomIndex];
    }

    function getCurrentVotes() {
      const nom = getCurrentNom();
      return votes[nom.id] || new Array(nom.candidates.length).fill(0);
    }

    function getTotalVotesForCurrent() {
      return getCurrentVotes().reduce((sum, v) => sum + v, 0);
    }

    // ============================================================
    //  ОТРИСОВКА
    // ============================================================
    function render() {
      const nom = getCurrentNom();
      const currentVotes = getCurrentVotes();
      const total = getTotalVotesForCurrent();

      // Заголовок
      nomTitle.textContent = nom.title;
      nomSub.textContent = nom.subtitle;

      // Счётчик номинаций
      nomCounter.textContent = `${currentNomIndex + 1} / ${NOMINATIONS.length}`;

      // Кнопки навигации
      prevNomBtn.disabled = (currentNomIndex === 0);
      nextNomBtn.disabled = (currentNomIndex === NOMINATIONS.length - 1);

      // Список кандидатов
      candidatesContainer.innerHTML = '';
      nom.candidates.forEach((candidate, idx) => {
        const isSelected = (selectedCandidateId === idx);
        const percent = total === 0 ? 0 : (currentVotes[idx] / total) * 100;

        const item = document.createElement('div');
        item.className = `candidate-item${isSelected ? ' selected' : ''}`;

        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'candidate';
        radio.value = idx;
        radio.checked = isSelected;
        radio.id = `cand_${idx}`;

        const label = document.createElement('label');
        label.htmlFor = `cand_${idx}`;
        label.textContent = candidate;

        item.appendChild(radio);
        item.appendChild(label);

        // Клик по всей строке
        item.addEventListener('click', (e) => {
          if (e.target.tagName !== 'INPUT') {
            radio.checked = true;
            const ev = new Event('change', { bubbles: true });
            radio.dispatchEvent(ev);
          }
        });

        radio.addEventListener('change', (e) => {
          if (e.target.checked) {
            document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            selectedCandidateId = idx;
            selectedHint.textContent = `✅ «${candidate}»`;
            voteBtn.disabled = false;
            statusText.textContent = '📌 Выбран кандидат. Нажмите «Отдать голос»';
          }
        });

        candidatesContainer.appendChild(item);
      });

      // Результаты
      if (total > 0) {
        resultsBlock.style.display = 'block';
        resultsBlock.innerHTML = '';
        nom.candidates.forEach((candidate, idx) => {
          const percent = (currentVotes[idx] / total) * 100;
          const row = document.createElement('div');
          row.className = 'result-row';
          row.innerHTML = `
            <span class="name">${candidate}</span>
            <div class="bar-wrapper">
              <div class="bar-fill" style="width: ${percent}%"></div>
            </div>
            <span class="percent">${Math.round(percent)}%</span>
          `;
          resultsBlock.appendChild(row);
        });
      } else {
        resultsBlock.style.display = 'none';
      }

      // Общее количество голосов
      totalVotesSpan.textContent = `${total} ${total % 10 === 1 && total % 100 !== 11 ? 'голос' : total % 10 >= 2 && total % 10 <= 4 && (total % 100 < 10 || total % 100 >= 20) ? 'голоса' : 'голосов'}`;

      // Статус
      if (selectedCandidateId === null) {
        voteBtn.disabled = true;
        selectedHint.textContent = '—';
        if (total === 0) {
          statusText.textContent = '💡 Выберите кандидата и нажмите «Отдать голос»';
        } else {
          statusText.textContent = '📊 Выберите кандидата для голосования';
        }
      } else {
        // проверяем, существует ли ещё выбранный кандидат
        if (selectedCandidateId >= nom.candidates.length) {
          selectedCandidateId = null;
          voteBtn.disabled = true;
          selectedHint.textContent = '—';
          statusText.textContent = '⚠️ Кандидат удалён, выберите заново';
        } else {
          voteBtn.disabled = false;
          // Если уже проголосовали, меняем статус
          if (total > 0) {
            statusText.textContent = '📌 Выберите кандидата для голосования (или сбросьте)';
          } else {
            statusText.textContent = '💡 Выберите кандидата и нажмите «Отдать голос»';
          }
        }
      }

      saveVotes();
    }

    // ============================================================
    //  ГОЛОСОВАНИЕ
    // ============================================================
    function handleVote() {
      if (selectedCandidateId === null) return;
      const nom = getCurrentNom();
      const currentVotes = votes[nom.id];
      if (!currentVotes) return;

      currentVotes[selectedCandidateId] += 1;
      // Сбросить выбор, чтобы можно было голосовать снова
      selectedCandidateId = null;
      // снять все радио
      document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
      document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
      voteBtn.disabled = true;
      selectedHint.textContent = '—';
      statusText.textContent = '✅ Голос учтён! Выберите другого кандидата или переключите номинацию.';

      render();
    }

    // ============================================================
    //  СБРОС ГОЛОСОВ (для текущей номинации)
    // ============================================================
    function handleReset() {
      const nom = getCurrentNom();
      const total = getTotalVotesForCurrent();
      if (total === 0) {
        // просто сбросить выбор
        selectedCandidateId = null;
        document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
        document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
        voteBtn.disabled = true;
        selectedHint.textContent = '—';
        statusText.textContent = '💡 Выберите кандидата';
        render();
        return;
      }

      if (confirm(`Сбросить все голоса в номинации «${nom.title}»? Это необратимо.`)) {
        const currentVotes = votes[nom.id];
        for (let i = 0; i < currentVotes.length; i++) {
          currentVotes[i] = 0;
        }
        selectedCandidateId = null;
        document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
        document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
        voteBtn.disabled = true;
        selectedHint.textContent = '—';
        statusText.textContent = '🔄 Голоса обнулены. Выберите кандидата.';
        render();
      }
    }

    // ============================================================
    //  НАВИГАЦИЯ
    // ============================================================
    function goToNom(index) {
      if (index < 0 || index >= NOMINATIONS.length) return;
      currentNomIndex = index;
      selectedCandidateId = null;
      // сбросить радио
      document.querySelectorAll('input[name="candidate"]').forEach(r => r.checked = false);
      document.querySelectorAll('.candidate-item').forEach(el => el.classList.remove('selected'));
      voteBtn.disabled = true;
      selectedHint.textContent = '—';
      statusText.textContent = '💡 Выберите кандидата и нажмите «Отдать голос»';
      render();
    }

    // ============================================================
    //  ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    function init() {
      loadVotes();
      // установить начальную номинацию
      currentNomIndex = 0;
      selectedCandidateId = null;
      render();

      // Обработчики
      voteBtn.addEventListener('click', handleVote);
      resetBtn.addEventListener('click', handleReset);
      prevNomBtn.addEventListener('click', () => goToNom(currentNomIndex - 1));
      nextNomBtn.addEventListener('click', () => goToNom(currentNomIndex + 1));
    }

    init();
  })();
</script>
</body>
</html>
